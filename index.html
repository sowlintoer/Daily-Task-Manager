<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Task Calendar</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --bg-color: #f4f4f5;
            --surface: #ffffff;
            --text-main: #18181b;
            --text-muted: #71717a;
            --border: #e4e4e7;
            --radius-lg: 16px;
            --radius-md: 10px;
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            --highlight: #e0e7ff; 
            --highlight-border: #4f46e5;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background: var(--bg-color); 
            color: var(--text-main);
            margin: 0; 
            padding: 20px 20px 80px 20px; 
            -webkit-font-smoothing: antialiased;
        }
        
        h2 { margin-top: 0; font-weight: 600; font-size: 1.5rem; letter-spacing: -0.02em; }
        
        .sheet { display: none; max-width: 500px; margin: 0 auto; background: var(--surface); padding: 24px; border-radius: var(--radius-lg); box-shadow: var(--shadow); }
        .sheet.active { display: block; animation: fadeIn 0.3s ease; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* Forms & Inputs */
        .form-group { margin-bottom: 20px; }
        .flex-group { display: flex; gap: 12px; margin-bottom: 20px; }
        .flex-group > div { flex: 1; }
        .flex-row { display: flex; gap: 10px; margin-bottom: 20px; align-items: stretch; }
        
        label { display: block; font-size: 0.875rem; font-weight: 500; color: var(--text-muted); margin-bottom: 8px; }
        
        input[type="text"], input[type="month"], input[type="date"], select { 
            width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: var(--radius-md); 
            font-size: 1rem; box-sizing: border-box; background: #fafafa; transition: border 0.2s; margin: 0;
        }
        input:focus, select:focus { outline: none; border-color: #a1a1aa; background: #fff; }
        
        button { 
            width: 100%; background: var(--text-main); color: white; border: none; 
            padding: 14px; border-radius: var(--radius-md); font-size: 1rem; font-weight: 500; 
            cursor: pointer; transition: transform 0.1s; margin: 0;
        }
        button:active { transform: scale(0.98); }
        button:disabled { background: var(--text-muted); cursor: not-allowed; opacity: 0.7; }
        
        .btn-outline { background: transparent; color: var(--text-main); border: 1px solid var(--border); width: auto; white-space: nowrap; }
        .btn-outline.active { background: var(--text-main); color: white; border-color: var(--text-main); }
        .btn-primary { background: var(--highlight-border); color: white; margin-bottom: 15px; }

        /* Task List */
        .task-item { 
            display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; margin-bottom: 8px; 
            background: #fafafa; border: 1px solid var(--border); border-radius: var(--radius-md); 
            transition: all 0.2s;
        }
        .task-item-left { display: flex; align-items: center; }
        .task-color-indicator { width: 12px; height: 12px; border-radius: 50%; margin-right: 12px; flex-shrink: 0; }
        
        /* Delete Button */
        .delete-btn {
            width: auto; background: transparent; color: var(--text-muted); border: none; 
            padding: 6px; border-radius: 6px; margin: 0; opacity: 0; transition: all 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .delete-btn:hover { background: #fee2e2; color: #ef4444; }
        .task-item:hover .delete-btn { opacity: 1; }
        @media (hover: none) { .delete-btn { opacity: 1; } }

        /* Calendar */
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; }
        .day { 
            aspect-ratio: 1/1; background: #fafafa; border: 1px solid var(--border); 
            border-radius: 8px; padding: 6px; position: relative; cursor: pointer; 
            display: flex; flex-direction: column; align-items: center; transition: all 0.2s;
        }
        .day:hover { background: #f4f4f5; }
        .day.header { background: transparent; border: none; font-size: 0.75rem; color: var(--text-muted); font-weight: 600; text-align: center; cursor: default; padding-bottom: 0; aspect-ratio: auto; min-height: 20px; }
        .day.empty { background: transparent; border: none; cursor: default; }
        .day-num { font-size: 0.875rem; font-weight: 500; margin-bottom: 4px; text-align: center; line-height: 1.1; pointer-events: none; }
        
        .day.bulk-selected { background: var(--highlight); border: 2px solid var(--highlight-border); }

        .dot-container { display: flex; flex-wrap: wrap; gap: 3px; justify-content: center; width: 100%; pointer-events: none; }
        .dot { width: 8px; height: 8px; border-radius: 50%; }

        /* Stats & Export Area */
        .export-wrapper { background: var(--surface); padding: 10px; border-radius: var(--radius-md); margin-bottom: 20px; }
        .stats-box { background: #fafafa; border: 1px solid var(--border); padding: 24px; border-radius: var(--radius-md); text-align: center; margin-bottom: 24px; }
        .stats-box h1 { margin: 0; font-size: 3rem; color: var(--text-main); }
        .stats-box p { margin: 5px 0 0 0; color: var(--text-muted); font-size: 0.875rem; text-transform: uppercase; letter-spacing: 0.05em; }

        .export-btn { margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px; background: #10b981; }
        .export-btn:hover { background: #059669; }

        /* Navigation */
        .tabs { 
            display: flex; position: fixed; bottom: 0; left: 0; width: 100%; 
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); 
            border-top: 1px solid var(--border); z-index: 100; padding-bottom: env(safe-area-inset-bottom);
        }
        .tab { flex: 1; padding: 16px 0; text-align: center; cursor: pointer; font-size: 0.875rem; font-weight: 600; color: var(--text-muted); }
        .tab.active { color: var(--text-main); }

        /* Modal */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.4); backdrop-filter: blur(4px); justify-content: center; align-items: flex-end; z-index: 1000; }
        .modal-content { background: var(--surface); padding: 24px; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; box-sizing: border-box; animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .modal-btn { display: flex; align-items: center; justify-content: space-between; background: #fafafa; border: 1px solid var(--border); color: var(--text-main); margin-bottom: 10px; }
        .modal-btn.active { border-color: var(--text-main); font-weight: 600; }
        .cancel-btn { background: var(--bg-color); color: var(--text-main); margin-top: 20px; }
    </style>
</head>
<body>

    <div id="sheet1" class="sheet active">
        <h2>New Task</h2>
        <div class="form-group">
            <label>Task Name</label>
            <input type="text" id="taskName" placeholder="e.g., Drink Milk">
        </div>
        <div class="form-group">
            <label>Marker Color</label>
            <select id="taskColor">
                <option value="#fbbf24">🟡 Amber Yellow</option>
                <option value="#ef4444">🔴 Coral Red</option>
                <option value="#22c55e">🟢 Mint Green</option>
                <option value="#3b82f6">🔵 Ocean Blue</option>
                <option value="#a855f7">🟣 Royal Purple</option>
            </select>
        </div>
        <button onclick="addTask()">Create Task</button>
        
        <div style="margin-top: 32px;">
            <label>Your Tasks</label>
            <div id="taskList"></div>
        </div>
    </div>

    <div id="sheet2" class="sheet">
        <h2>Calendar</h2>
        
        <div class="flex-row">
            <input type="month" id="monthPicker" style="flex: 1;" onchange="handleMonthChange()">
            <button id="bulkToggleBtn" class="btn-outline" onclick="toggleBulkMode()">Bulk Select</button>
        </div>
        
        <button id="applyBulkBtn" class="btn-primary" style="display: none;" onclick="openBulkModal()">Apply Task to Selected</button>

        <div id="calendar" class="calendar-grid"></div>
    </div>

    <div id="sheet3" class="sheet">
        <h2>History Filter</h2>
        <div class="form-group">
            <label>Select Task</label>
            <select id="filterSelect" onchange="renderFilteredCalendar()"></select>
        </div>
        
        <div class="flex-group">
            <div>
                <label>From Date</label>
                <input type="date" id="fromDate" onchange="renderFilteredCalendar()">
            </div>
            <div>
                <label>To Date</label>
                <input type="date" id="toDate" onchange="renderFilteredCalendar()">
            </div>
        </div>

        <div id="exportArea" class="export-wrapper">
            <h3 id="exportTitle" style="text-align: center; margin-top: 0; color: var(--text-main); display: none;">Task History</h3>
            
            <div class="stats-box">
                <h1 id="totalDays">0</h1>
                <p>Days Completed</p>
            </div>
            
            <div id="filterCalendar" class="calendar-grid"></div>
        </div>

        <button class="export-btn" id="downloadBtn" onclick="exportToPNG()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                <polyline points="7 10 12 15 17 10"></polyline>
                <line x1="12" y1="15" x2="12" y2="3"></line>
            </svg>
            Save as Image
        </button>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="showSheet(1)">Add</div>
        <div class="tab" onclick="showSheet(2)">Calendar</div>
        <div class="tab" onclick="showSheet(3)">History</div>
    </div>

    <div id="modal" onclick="closeModal()">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3 style="margin-top: 0; margin-bottom: 20px;">Log Tasks for <span id="modalDateDisplay"></span></h3>
            <div id="modalOptions"></div>
            <button class="cancel-btn" onclick="closeModal()">Done/Cancel</button>
        </div>
    </div>

    <script>
        let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        let completions = JSON.parse(localStorage.getItem('completions')) || [];
        let viewDate = new Date(); 
        let selectedDateStr = null;
        
        let isBulkMode = false;
        let bulkSelectedDates = [];
        let isModalInBulkMode = false;

        function showSheet(num) {
            document.querySelectorAll('.sheet').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById('sheet' + num).classList.add('active');
            document.querySelectorAll('.tab')[num-1].classList.add('active');
            
            if(num === 2) {
                updateMonthPicker();
                renderStandardCalendar();
            }
            if(num === 3) {
                const fromInput = document.getElementById('fromDate');
                const toInput = document.getElementById('toDate');
                if (!fromInput.value || !toInput.value) {
                    const today = new Date();
                    const firstDay = new Date(today.getFullYear(), today.getMonth(), 1);
                    fromInput.value = firstDay.toLocaleDateString('en-CA'); 
                    toInput.value = today.toLocaleDateString('en-CA');
                }
                updateFilterOptions();
                renderFilteredCalendar();
            }
        }

        function addTask() {
            const name = document.getElementById('taskName').value.trim();
            const color = document.getElementById('taskColor').value;
            if(!name) return;
            tasks.push({ id: Date.now(), name, color });
            localStorage.setItem('tasks', JSON.stringify(tasks));
            document.getElementById('taskName').value = '';
            renderTaskList();
        }

        function deleteTask(taskId) {
            if(confirm("Are you sure you want to delete this task? This will also permanently remove it from your calendar history.")) {
                tasks = tasks.filter(t => t.id !== taskId);
                completions = completions.filter(c => c.taskId !== taskId);
                localStorage.setItem('tasks', JSON.stringify(tasks));
                localStorage.setItem('completions', JSON.stringify(completions));
                renderTaskList();
            }
        }

        function renderTaskList() {
            const list = document.getElementById('taskList');
            if(tasks.length === 0) { list.innerHTML = '<div style="color:#a1a1aa; font-size:0.875rem;">No tasks yet.</div>'; return; }
            list.innerHTML = tasks.map(t => `
                <div class="task-item">
                    <div class="task-item-left">
                        <div class="task-color-indicator" style="background:${t.color}"></div>
                        <span style="font-weight: 500;">${t.name}</span>
                    </div>
                    <button class="delete-btn" onclick="deleteTask(${t.id})" title="Delete Task">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                        </svg>
                    </button>
                </div>
            `).join('');
        }

        function updateMonthPicker() {
            const picker = document.getElementById('monthPicker');
            const yyyy = viewDate.getFullYear();
            const mm = String(viewDate.getMonth() + 1).padStart(2, '0');
            picker.value = `${yyyy}-${mm}`;
        }

        function handleMonthChange() {
            const picker = document.getElementById('monthPicker');
            if (picker.value) {
                const [year, month] = picker.value.split('-');
                viewDate = new Date(year, month - 1, 1);
                renderStandardCalendar();
            }
        }

        function toggleBulkMode() {
            isBulkMode = !isBulkMode;
            bulkSelectedDates = []; 
            
            const btn = document.getElementById('bulkToggleBtn');
            const applyBtn = document.getElementById('applyBulkBtn');
            
            if (isBulkMode) {
                btn.innerText = "Cancel Bulk";
                btn.classList.add("active");
                applyBtn.style.display = "block";
            } else {
                btn.innerText = "Bulk Select";
                btn.classList.remove("active");
                applyBtn.style.display = "none";
            }
            renderStandardCalendar();
        }

        function handleDateClick(dateStr, dayNum) {
            if (isBulkMode) {
                const index = bulkSelectedDates.indexOf(dateStr);
                if (index > -1) { bulkSelectedDates.splice(index, 1); } 
                else { bulkSelectedDates.push(dateStr); }
                renderStandardCalendar(); 
            } else {
                openModal(dateStr, dayNum);
            }
        }

        function renderStandardCalendar() {
            const container = document.getElementById('calendar');
            container.innerHTML = '';
            
            const year = viewDate.getFullYear();
            const month = viewDate.getMonth();

            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const firstDayIndex = new Date(year, month, 1).getDay(); 

            ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(h => {
                const div = document.createElement('div');
                div.className = 'day header'; div.innerText = h;
                container.appendChild(div);
            });

            for (let i = 0; i < firstDayIndex; i++) {
                const div = document.createElement('div'); div.className = 'day empty';
                container.appendChild(div);
            }

            for (let i = 1; i <= daysInMonth; i++) {
                const dStr = String(i).padStart(2, '0');
                const mStr = String(month + 1).padStart(2, '0');
                const dateStr = `${year}-${mStr}-${dStr}`;
                
                const div = document.createElement('div');
                div.className = 'day';
                
                if (isBulkMode && bulkSelectedDates.includes(dateStr)) { div.classList.add('bulk-selected'); }

                div.innerHTML = `<div class="day-num">${i}</div><div class="dot-container"></div>`;
                
                const dayCompletions = completions.filter(c => c.date === dateStr);
                const dotContainer = div.querySelector('.dot-container');
                
                dayCompletions.forEach(c => {
                    const task = tasks.find(t => t.id == c.taskId);
                    if (task) {
                        const dot = document.createElement('div');
                        dot.className = 'dot'; dot.style.background = task.color;
                        dotContainer.appendChild(dot);
                    }
                });

                div.onclick = () => handleDateClick(dateStr, i);
                container.appendChild(div);
            }
            
            if (isBulkMode) {
                document.getElementById('applyBulkBtn').innerText = `Apply Task to ${bulkSelectedDates.length} Selected`;
            }
        }

        function renderFilteredCalendar() {
            const taskId = document.getElementById('filterSelect').value;
            const fromDateVal = document.getElementById('fromDate').value;
            const toDateVal = document.getElementById('toDate').value;
            const container = document.getElementById('filterCalendar');
            container.innerHTML = '';

            let count = 0;
            if (taskId && fromDateVal && toDateVal) {
                count = completions.filter(c => c.taskId == taskId && c.date >= fromDateVal && c.date <= toDateVal).length;
            }
            document.getElementById('totalDays').innerText = count;

            if (!fromDateVal || !toDateVal) return;

            const [fYear, fMonth, fDay] = fromDateVal.split('-');
            const [tYear, tMonth, tDay] = toDateVal.split('-');
            const startDate = new Date(fYear, fMonth - 1, fDay);
            const endDate = new Date(tYear, tMonth - 1, tDay);

            if (startDate > endDate) return;

            ['S', 'M', 'T', 'W', 'T', 'F', 'S'].forEach(h => {
                const div = document.createElement('div'); div.className = 'day header'; div.innerText = h;
                container.appendChild(div);
            });

            const firstDayIndex = startDate.getDay();
            for (let i = 0; i < firstDayIndex; i++) {
                const div = document.createElement('div'); div.className = 'day empty';
                container.appendChild(div);
            }

            let currentDate = new Date(startDate);
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];

            while (currentDate <= endDate) {
                const year = currentDate.getFullYear();
                const mStr = String(currentDate.getMonth() + 1).padStart(2, '0');
                const dStr = String(currentDate.getDate()).padStart(2, '0');
                const dateStr = `${year}-${mStr}-${dStr}`;

                const div = document.createElement('div'); div.className = 'day';

                let dayDisplay = currentDate.getDate();
                let isMonthStart = (currentDate.getDate() === 1 || currentDate.getTime() === startDate.getTime());
                if (isMonthStart) dayDisplay = `${monthNames[currentDate.getMonth()]} ${dayDisplay}`;

                div.innerHTML = `<div class="day-num" style="${isMonthStart ? 'font-size: 0.65rem; font-weight: 700; color: var(--text-main);' : ''}">${dayDisplay}</div><div class="dot-container"></div>`;

                const dayCompletions = completions.filter(c => c.date === dateStr);
                const dotContainer = div.querySelector('.dot-container');
                
                dayCompletions.forEach(c => {
                    const task = tasks.find(t => t.id == c.taskId);
                    if (task && (!taskId || task.id == taskId)) {
                        const dot = document.createElement('div'); dot.className = 'dot'; dot.style.background = task.color;
                        dotContainer.appendChild(dot);
                    }
                });

                container.appendChild(div);
                currentDate.setDate(currentDate.getDate() + 1);
            }
        }

        function openModal(dateStr, dayNum) {
            if(tasks.length === 0) { alert("Please add a task in Sheet 1 first!"); return; }
            selectedDateStr = dateStr;
            isModalInBulkMode = false;
            
            const monthNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
            document.getElementById('modalDateDisplay').innerText = `${monthNames[viewDate.getMonth()]} ${dayNum}`;
            
            document.getElementById('modal').style.display = 'flex';
            renderModalOptions();
        }

        function openBulkModal() {
            if(bulkSelectedDates.length === 0) { alert("Please select at least one date!"); return; }
            if(tasks.length === 0) { alert("Please add a task in Sheet 1 first!"); return; }
            
            isModalInBulkMode = true;
            document.getElementById('modalDateDisplay').innerText = `${bulkSelectedDates.length} Selected Days`;
            document.getElementById('modal').style.display = 'flex';
            
            const options = document.getElementById('modalOptions');
            options.innerHTML = tasks.map(t => `
                <button class="modal-btn" onclick="applyBulkTask(${t.id})">
                    <div style="display:flex; align-items:center;">
                        <div class="task-color-indicator" style="background:${t.color}"></div>
                        ${t.name}
                    </div>
                    <span>Add to All +</span>
                </button>
            `).join('');
        }

        function renderModalOptions() {
            if (isModalInBulkMode) return; 
            
            const options = document.getElementById('modalOptions');
            options.innerHTML = tasks.map(t => {
                const isCompleted = completions.some(c => c.date === selectedDateStr && c.taskId === t.id);
                return `
                <button class="modal-btn ${isCompleted ? 'active' : ''}" onclick="toggleCompletion(${t.id})">
                    <div style="display:flex; align-items:center;">
                        <div class="task-color-indicator" style="background:${t.color}"></div>
                        ${t.name}
                    </div>
                    ${isCompleted ? '✓' : '+'}
                </button>
                `;
            }).join('');
        }

        function closeModal() { document.getElementById('modal').style.display = 'none'; }

        function toggleCompletion(taskId) {
            const existsIndex = completions.findIndex(c => c.date === selectedDateStr && c.taskId === taskId);
            if(existsIndex > -1) { completions.splice(existsIndex, 1); } 
            else { completions.push({ date: selectedDateStr, taskId: taskId }); }
            
            localStorage.setItem('completions', JSON.stringify(completions));
            renderModalOptions(); 
            renderStandardCalendar(); 
        }

        function applyBulkTask(taskId) {
            bulkSelectedDates.forEach(dateStr => {
                const alreadyExists = completions.some(c => c.date === dateStr && c.taskId === taskId);
                if (!alreadyExists) {
                    completions.push({ date: dateStr, taskId: taskId });
                }
            });
            
            localStorage.setItem('completions', JSON.stringify(completions));
            closeModal();
            toggleBulkMode(); 
        }

        function updateFilterOptions() {
            const select = document.getElementById('filterSelect');
            select.innerHTML = '<option value="">-- All Tasks --</option>' + 
                tasks.map(t => `<option value="${t.id}">${t.name}</option>`).join('');
        }

        // --- Export to PNG Logic ---
        function exportToPNG() {
            const exportArea = document.getElementById('exportArea');
            const downloadBtn = document.getElementById('downloadBtn');
            const exportTitle = document.getElementById('exportTitle');
            
            // Show title for the image, disable button to prevent multiple clicks
            exportTitle.style.display = 'block';
            downloadBtn.innerText = 'Creating Image...';
            downloadBtn.disabled = true;

            // Optional: Get the task name for the filename
            const select = document.getElementById('filterSelect');
            const taskName = select.options[select.selectedIndex].text;
            const fileNameName = taskName !== "-- All Tasks --" ? taskName.replace(/ /g, '_') : "All_Tasks";
            
            // Use html2canvas to capture the element
            html2canvas(exportArea, {
                scale: 2, // Higher resolution
                backgroundColor: '#ffffff' // Ensure white background
            }).then(canvas => {
                // Create a temporary link to download the image
                const link = document.createElement('a');
                link.download = `Task_History_${fileNameName}.png`;
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                // Reset UI
                exportTitle.style.display = 'none';
                downloadBtn.innerHTML = `
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg> Save as Image`;
                downloadBtn.disabled = false;
            }).catch(err => {
                console.error("Error creating image:", err);
                alert("Sorry, there was an error generating the image.");
                downloadBtn.disabled = false;
            });
        }

        renderTaskList();
        updateMonthPicker();
    </script>
</body>
</html>
